services:
    app:
        image: jeongjaewon1/study-mate:latest
        container_name: study-mate-app
        restart: unless-stopped
        env_file: .env
        environment:
            - NODE_ENV=production
    # 배포 자동화 전까지 사용
    # build:
    #     context: .
    #     dockerfile: Dockerfile
    #     args:
    #         NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
    #         NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    #         NEXT_PUBLIC_STORAGE_BUCKET_POST: ${NEXT_PUBLIC_STORAGE_BUCKET_POST}
    #         NEXT_PUBLIC_STORAGE_BUCKET_PROFILE: ${NEXT_PUBLIC_STORAGE_BUCKET_PROFILE}
    # container_name: study-mate-app
    # restart: unless-stopped
    # env_file: .env
    # environment:
    #     - NODE_ENV=production

    nginx:
        image: nginx:alpine
        container_name: study-mate-nginx
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - /etc/letsencrypt:/etc/letsencrypt:ro
        depends_on:
            - app
        restart: unless-stopped
